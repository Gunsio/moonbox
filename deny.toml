[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
yanked = "deny"
unmaintained = "workspace"
unsound = "all"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "simplest-path"
skip = [
    { crate = "foldhash@0.1.5", reason = "hashlink/rusqlite and ratatui currently resolve different hashbrown families; revisit when upstreams converge" },
    { crate = "hashbrown@0.15.5", reason = "hashlink/rusqlite and ratatui currently resolve different hashbrown families; revisit when upstreams converge" },
]

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "allow"
unused-license-exception = "allow"
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
exceptions = [
    { crate = "terminfo", allow = ["WTFPL"] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
