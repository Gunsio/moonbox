name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "milestone/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV build
        run: cargo check --locked

  rust:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

      - name: Run fixture replay evaluation
        run: cargo run --locked -- replay-eval --json

      - name: Run fixture-safe CLI smoke
        run: scripts/ci/cli-smoke.sh

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify package
        run: cargo package --locked

  docs:
    name: Documentation assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate SVG screenshot
        run: xmllint --noout docs/assets/moonbox-tui.svg
