name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "milestone/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV build
        run: cargo check --locked

  rust:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

      - name: Build crate docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps

      - name: Run fixture replay evaluation
        run: cargo run --locked -- replay-eval --json

      - name: Run fixture-safe CLI smoke
        run: scripts/ci/cli-smoke.sh

      - name: Run Homebrew docs smoke
        run: scripts/ci/homebrew-docs-smoke.sh

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify package hygiene
        run: scripts/ci/package-hygiene.sh

      - name: Verify package
        run: cargo package --locked

      - name: Run release artifacts smoke
        run: scripts/ci/release-artifacts-smoke.sh

      - name: Run install smoke
        run: scripts/ci/install-smoke.sh

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  docs:
    name: Documentation assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate docs assets
        run: scripts/ci/docs-assets-smoke.sh
